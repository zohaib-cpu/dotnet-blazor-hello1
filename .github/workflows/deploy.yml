name: Blazor WASM Auto Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:  

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x

    - name: Publish Project
      run: dotnet publish DotnetBlazorHello.csproj -c Release -o publish

    - name: List Publish Folder
      run: ls -lR publish/wwwroot

    # --- Copy to temporary folder on EC2 ---
    - name: Copy Files to EC2 Temp Folder
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "publish/wwwroot/"
        target: "/home/ubuntu/temp_wwwroot"

    # --- Move files to /var/www/html with sudo ---
    - name: Deploy to /var/www/html
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          sudo rm -rf /var/www/html/*
          sudo mv /home/ubuntu/temp_wwwroot/* /var/www/html/
          sudo rm -rf /home/ubuntu/temp_wwwroot
          if [ -f /var/www/html/index.nginx-debian.html ]; then
              sudo rm /var/www/html/index.nginx-debian.html
          fi
          sudo chown -R www-data:www-data /var/www/html
          sudo find /var/www/html -type d -exec chmod 755 {} \;
          sudo find /var/www/html -type f -exec chmod 644 {} \;
          sudo nginx -t
          sudo systemctl reload nginx